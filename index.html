
<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TANNENKUSS111 – Belegungskalender</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="description" content="Ferienwohnung TANNENKUSS111 – Belegungskalender / Availability Calendar, Ferienpark Hahnenklee">
</head>

<body>
  <main class="container">

    <!-- Logo -->
    <div class="brand">
      <img src="tkus111.jpg" alt="Tannenkuss111 – Ferienpark Hahnenklee" loading="lazy">
    </div>

    <h1>Ferienwohnung TANNENKUSS111</h1>
    <p class="subtitle">Belegungskalender – Availability Calendar</p>

    <!-- Hinweisbox -->
    <div class="notice">
      🟩 Grün = frei — 🟥 Rot = belegt<br>
      Green = available — Red = booked
    </div>

    <!-- Kalender -->
    <div id="calendar"></div>

    <p class="legend">
      <span class="free"></span> frei / available &nbsp;&nbsp;
      <span class="blocked"></span> belegt / booked
    </p>

    <!-- Anfrageformular -->
    <h2>Anfrage senden – Send Inquiry</h2>
    <form action="https://formsubmit.co/play8282@gmx.de" method="POST">
      <label>Name / Name</label>
      <input type="text" name="name" required>

      <label>E‑Mail / Email</label>
      <input type="email" name="email" required>

      <label>Anreise / Arrival</label>
      <input type="date" name="arrival" required>

      <label>Abreise / Departure</label>
      <input type="date" name="departure" required>

      <label>Nachricht / Message</label>
      <textarea name="message" rows="4"></textarea>

      <!-- Optionen FormSubmit -->
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_subject" value="Anfrage über Belegungskalender – TANNENKUSS111">
      <input type="hidden" name="_template" value="box">

      <button type="submit">Absenden / Send</button>
    </form>

    <!-- QR-Code -->
    <h2>QR‑Code</h2>
    <img
      src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://tannenkuss111.github.io/Belegungskalender"
      alt="QR-Code TANNENKUSS111 Kalender" width="250" height="250" loading="lazy">
  </main>

  <script src="calendar.js"></script>
</body>
</html>
